# Server Port
server.port=8080

# File Upload Configurations
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Gemini Configuration (Optional placeholder - can be set as system environment variable GEMINI_API_KEY)
gemini.api.key=

# Logging level
logging.level.com.ats.resumeanalyzer=DEBUG
logging.level.org.springframework.web=INFO
